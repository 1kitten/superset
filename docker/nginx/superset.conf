# Снятие префикса /superset/ из URL на reverse-proxy.
#
# Идея:
#   1. Чистые URL (/dashboard/1, /welcome) переписываются в бэкендовые /superset/...
#   2. Старые /superset/... остаются рабочими (passthrough) — нет битых ссылок.
#   3. В HTML-ответах ссылки /superset/... превращаются в чистые через sub_filter,
#      чтобы в UI пользователь видел красивые адреса.
#
# Коллизии: /dashboard/list/ и /chart/list/ — РЕАЛЬНЫЕ роуты без префикса
# (Flask-AppBuilder list-вью). Поэтому переписываем только /dashboard/<id|slug>,
# исключая list/add/edit.

upstream superset_app {
    server superset:8088;
    keepalive 32;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 100M;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    # В HTML переписываем абсолютные ссылки /superset/ -> / (косметика URL в UI).
    sub_filter_once off;
    sub_filter_types text/html;
    sub_filter 'href="/superset/' 'href="/';
    sub_filter "href='/superset/" "href='/";

    # --- Чистый landing: /welcome -> /superset/welcome/ ---
    location ~ ^/welcome/?$ {
        rewrite ^.*$ /superset/welcome/ break;
        proxy_pass http://superset_app;
    }

    # --- Чистый dashboard: /dashboard/<id|slug> -> /superset/dashboard/<id|slug>/ ---
    # Исключаем list/add/edit — это собственные роуты без префикса.
    location ~ ^/dashboard/(?!list|add|edit)(?<rest>.+?)/?$ {
        rewrite ^.*$ /superset/dashboard/$rest/ break;
        proxy_pass http://superset_app;
    }

    # --- Чистый explore (charts) ---
    location ~ ^/explore/(?<rest>.+)$ {
        rewrite ^.*$ /superset/explore/$rest break;
        proxy_pass http://superset_app;
    }

    # --- Passthrough: уже-префиксные и все прочие пути (login, api, static, ...) ---
    location / {
        proxy_pass http://superset_app;
    }
}

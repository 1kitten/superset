# Имитация production-окружения для кастомного Superset 6.1.0.
#
#   db              — Postgres (metadata DB)
#   redis           — кэш / celery broker / results backend
#   superset-init   — one-shot: миграции + админ + init, затем выходит
#   superset        — Gunicorn-приложение
#   superset-worker — Celery worker (async queries, alerts & reports)
#   nginx           — reverse-proxy, снимает префикс /superset/ (PR #6), вход :80
#
# Запуск:  docker compose up -d --build      UI: http://localhost/

x-superset-image: &superset-image custom-superset:6.1.0
x-superset-build: &superset-build
  context: .
  dockerfile: Dockerfile.custom
x-superset-config: &superset-config
  env_file: .env
  environment:
    SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
  volumes:
    - ./docker/superset_config.py:/app/pythonpath/superset_config.py:ro

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DATABASE_DB:-superset}
      POSTGRES_USER: ${DATABASE_USER:-superset}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-superset}
    volumes:
      - db_home:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DATABASE_USER:-superset}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_home:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  superset-init:
    image: *superset-image
    build: *superset-build
    # Штатный init-скрипт образа: миграции + админ + superset init.
    # Установить SUPERSET_LOAD_EXAMPLES=yes в .env, чтобы получить демо-дашборды.
    command: ["bash", "/app/docker/docker-init.sh"]
    <<: *superset-config
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"

  superset:
    image: *superset-image
    build: *superset-build
    command:
      - gunicorn
      - --bind=0.0.0.0:8088
      - --workers=4
      - --worker-class=gthread
      - --threads=20
      - --timeout=120
      - --limit-request-line=0
      - --limit-request-field_size=0
      - "superset.app:create_app()"
    <<: *superset-config
    expose:
      - "8088"
    depends_on:
      superset-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  superset-worker:
    image: *superset-image
    build: *superset-build
    command: ["celery", "--app=superset.tasks.celery_app:app", "worker", "-O", "fair", "-c", "2"]
    <<: *superset-config
    depends_on:
      superset-init:
        condition: service_completed_successfully
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/superset.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      superset:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_home:
  redis_home:
